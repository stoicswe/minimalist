name: Release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Mark the release as prerelease"
        type: boolean
        default: true

jobs:
  release:
    runs-on: [self-hosted, macOS, mac-mini]
    permissions:
      contents: write
    env:
      SCHEME: Minimalist
      ARCHIVE_PATH: build/Minimalist.xcarchive
      EXPORT_DIR: build/export
      NOTARY_PROFILE: minimalist-notary
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate app icon
        run: swift make-icon.swift

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Stamp version
        run: |
          DATESTAMP=$(date -u +%Y%m%d)
          BUILD="${DATESTAMP}.${{ github.run_number }}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" Resources/Info.plist
          MARKETING=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Resources/Info.plist)
          VERSION="${MARKETING}+${BUILD}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "ASSET_NAME=Minimalist-${VERSION}.zip" >> "$GITHUB_ENV"
          echo "Marketing: $MARKETING"
          echo "Build:     $BUILD"
          echo "Version:   $VERSION"

      - name: Clean previous build
        run: rm -rf build

      - name: Archive
        run: |
          xcodebuild \
            -project Minimalist.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            archive

      - name: Export Developer ID-signed .app
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_DIR" \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Verify signature
        run: |
          codesign --verify --deep --strict --verbose=2 "$EXPORT_DIR/Minimalist.app"
          codesign -dvv "$EXPORT_DIR/Minimalist.app" 2>&1 | grep -E "Authority|TeamIdentifier"

      - name: Notarize
        run: |
          ditto -c -k --keepParent "$EXPORT_DIR/Minimalist.app" build/notary.zip
          xcrun notarytool submit build/notary.zip \
            --keychain-profile "$NOTARY_PROFILE" \
            --wait

      - name: Staple
        run: |
          xcrun stapler staple "$EXPORT_DIR/Minimalist.app"
          xcrun stapler validate "$EXPORT_DIR/Minimalist.app"

      - name: Package release zip
        run: |
          ditto -c -k --keepParent "$EXPORT_DIR/Minimalist.app" "$ASSET_NAME"
          ls -la "$ASSET_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: ${{ env.ASSET_NAME }}
